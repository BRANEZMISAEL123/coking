<div class="container py-5">

<h1 class="text-center mb-4">
Nuestros Cursos
</h1>

<table class="table table-bordered table-hover text-center">

<thead>

<tr>

<th>ID</th>
<th>Curso</th>
<th>Duración</th>
<th>Modalidad</th>

</tr>

</thead>

<tbody id="tablaCursos">

</tbody>

</table>

</div>

<footer class="text-center">

<p>

© 2026 Cooking Academy

<br>

BRAÑEZ VINO MISAEL TOMAS

</p>

</footer>

<script>

let cursos = [

{
id:1,
nombre:"Repostería",
duracion:"3 meses",
modalidad:"Presencial"
},

{
id:2,
nombre:"Cocina Internacional",
duracion:"4 meses",
modalidad:"Virtual"
},

{
id:3,
nombre:"Chef Profesional",
duracion:"6 meses",
modalidad:"Presencial"
},

{
id:4,
nombre:"Gastronomía Boliviana",
duracion:"2 meses",
modalidad:"Virtual"
}

];

let tabla = document.getElementById("tablaCursos");

cursos.forEach(curso => {

tabla.innerHTML += `

<tr>

<td>${curso.id}</td>

<td>${curso.nombre}</td>

<td>${curso.duracion}</td>

<td>${curso.modalidad}</td>

</tr>

`;

});

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
